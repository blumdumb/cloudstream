name: Archive build

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '*.md'
      - '*.json'
      - '**/wcokey.txt'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "Archive-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Decode Keystore
      id: decode_keystore
      run: |
        mkdir -p /home/runner/work/_temp/keystore/
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /home/runner/work/_temp/keystore/prerelease_keystore.keystore
        echo "key_pwd=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_OUTPUT
        echo "::add-mask::${{ secrets.KEYSTORE_PASSWORD }}"

    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Configure Signing Properties
      run: |
        echo "signing.store.file=prerelease_keystore.keystore" >> gradle.properties
        echo "signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
        echo "signing.key.alias=${{ secrets.KEY_ALIAS }}" >> gradle.properties
        echo "signing.key.password=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Run Gradle
      run: ./gradlew assemblePrereleaseRelease
      env:
        SIGNING_KEY_ALIAS: "${{ secrets.KEY_ALIAS }}"
        SIGNING_KEY_PASSWORD: ${{ steps.decode_keystore.outputs.key_pwd }}
        SIGNING_STORE_PASSWORD: ${{ steps.decode_keystore.outputs.key_pwd }}
        SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
        MDL_API_KEY: ${{ secrets.MDL_API_KEY }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudstream-apk
        path: app/build/outputs/apk/prerelease/release/*.apk
